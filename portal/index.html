    const AVATAR_BG_COLORS = [
      "#8b5cf6","#3b82f6","#10b981","#f59e0b",

    ];

    // ============================================================
    // 🚫 NÃO EDITE ABAIXO

    function getInitials(name) { return name.trim().charAt(0).toUpperCase(); }

    function getAvatarColor(name, color) {
      if (color) return color;
      let sum = 0;
      for (let i = 0; i < name.length; i++) sum += name.charCodeAt(i);
      return AVATAR_BG_COLORS[sum % AVATAR_BG_COLORS.length];
    }

    function createAvatar(name, src, color, size) {
      if (src) {
        const img = document.createElement('img');
        img.src = src; img.alt = name; img.className = 'avatar';
        img.style.width = size + 'px'; img.style.height = size + 'px';
        return img;
      }
      const div = document.createElement('div');
      div.className = 'avatar';
      div.style.width      = size + 'px';
      div.style.height     = size + 'px';
      div.style.fontSize   = (size * 0.45) + 'px';
      div.style.background = getAvatarColor(name, color);
      div.textContent      = getInitials(name);
      return div;
    }

    // Logo
    document.getElementById('logoText').textContent = LOGO_TEXT;
    if (LOGO_IMG) {
      const logoIcon = document.getElementById('logoIcon');
      logoIcon.innerHTML = '';
      logoIcon.style.background = 'transparent';
      logoIcon.style.overflow = 'hidden';
      const logoImg = document.createElement('img');
      logoImg.src = LOGO_IMG; logoImg.alt = LOGO_TEXT;
      logoImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:4px;';
      logoIcon.appendChild(logoImg);
    }

    // Textos
    document.getElementById('videoTitle').textContent      = VIDEO_TITLE;
    document.getElementById('channelName').textContent     = CHANNEL_NAME;
    document.getElementById('subscriberCount').textContent = SUBSCRIBERS;

    // Comentário fixado
    const pinnedHandle = '@' + CHANNEL_NAME.replace(/\s+/g, '');
    document.getElementById('pinnedUser').textContent   = pinnedHandle;
    document.getElementById('pinnedByName').textContent = pinnedHandle;
    const pinnedAvatarEl = document.getElementById('pinnedAvatar');
    if (CHANNEL_AVATAR) {
      pinnedAvatarEl.innerHTML = '';
      pinnedAvatarEl.style.background = 'transparent';
      pinnedAvatarEl.style.overflow = 'hidden';
      const pImg = document.createElement('img');
      pImg.src = CHANNEL_AVATAR; pImg.alt = CHANNEL_NAME;
      pImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;';
      pinnedAvatarEl.appendChild(pImg);
    } else {
      pinnedAvatarEl.textContent = getInitials(CHANNEL_NAME);
    }

    // Avatar do canal
    const chAvatar = document.getElementById('channelAvatar');
    if (CHANNEL_AVATAR) {
      chAvatar.innerHTML = '';
      chAvatar.style.background = 'transparent';
      chAvatar.style.overflow = 'hidden';
      const img = document.createElement('img');
      img.src = CHANNEL_AVATAR; img.alt = CHANNEL_NAME;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;';
      chAvatar.appendChild(img);
    } else {
      chAvatar.textContent = getInitials(CHANNEL_NAME);
    }

    // Chat
    const chatMessages = document.getElementById('chatMessages');
    const msgCount     = document.getElementById('msgCount');
    const viewerEl     = document.getElementById('viewerCount');
    let viewers = VIEWERS_START;
    let elapsed = 0;
    let visibleComments = [];
    const startTime = Date.now();

    function renderComments() {
      if (visibleComments.length === 0) {
        chatMessages.innerHTML = '<div class="chat-empty">Aguardando mensagens...</div>';
        msgCount.textContent = '0 mensagens';
        return;
      }
      chatMessages.innerHTML = '';
      visibleComments.forEach((c) => {
        const msg = document.createElement('div');
        msg.className = 'chat-msg';
        msg.appendChild(createAvatar(c.user, c.avatar || '', c.color, 30));
        const body = document.createElement('div');
        body.className = 'chat-msg-body';
        const user = document.createElement('div');
        user.className = 'chat-msg-user';
        user.textContent = '@' + c.user.replace(/\s+/g, '');
        const text = document.createElement('div');
        text.className = 'chat-msg-text';
        text.textContent = c.text;
        body.appendChild(user);
        body.appendChild(text);
        msg.appendChild(body);
        chatMessages.appendChild(msg);
      });
      const total = visibleComments.length;
      msgCount.textContent = total + ' mensagen' + (total === 1 ? '' : 's');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    setInterval(() => {
      elapsed = Math.floor((Date.now() - startTime) / 1000);
      viewers += Math.floor(Math.random() * 5) - 1;
      viewerEl.textContent = viewers.toLocaleString('pt-BR') + ' assistindo agora';
      const newVisible = COMMENTS.filter(c => c.time <= elapsed);
      if (newVisible.length !== visibleComments.length) {
        visibleComments = newVisible;
        renderComments();
      }
    }, 1000);

    // Desabilita PiP
    function disablePiP() {
      document.querySelectorAll('video').forEach(function(v) {
        v.disablePictureInPicture = true;
        v.setAttribute('disablepictureinpicture', '');
        v.setAttribute('controlslist', 'nodownload nofullscreen noremoteplayback');
      });
    }
    disablePiP();
    const pipObserver = new MutationObserver(disablePiP);
    pipObserver.observe(document.body, { childList: true, subtree: true });
